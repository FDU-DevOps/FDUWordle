# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  pull_request:
    branches: [ 'master' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'maven' # Use 'gradle' if you use Gradle

      - name: Build and generate JaCoCo report
        run: mvn clean verify org.jacoco:jacoco-maven-plugin:report

      - name: Publish JaCoCo Report as PR comment
        uses: Madrapps/jacoco-report@v1.3.1
        with:
          paths: FDUWordle/target/site/jacoco/jacoco.xml
          //github-token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70 
          min-coverage-changed-files: 70
