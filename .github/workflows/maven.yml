
name: Java CI with Maven

on:
  pull_request:
    branches: [ 'master' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'maven' # Use 'gradle' if you use Gradle

      - name: Build and generate JaCoCo report
        run: mvn clean verify org.jacoco:jacoco-maven-plugin:report

      - name: Publish JaCoCo Report as PR comment
        uses: Madrapps/jacoco-report@v1.3.1
        with:
          paths: FDUWordle/target/site/jacoco/jacoco.xml
          //github-token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70 
          min-coverage-changed-files: 70
