
name: Java CI with Maven

on:
  pull_request:
    branches: [ 'master' ]

permissions:    #CHANGE WORDING
      contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code from branch
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B clean verify

      - name: Upload JAR file
        uses: actions/upload-artifact@v6
        with:
          name: wordle-jar
          path: target/*.jar

      #- name: Build and generate JaCoCo report
      #  run: mvn clean verify org.jacoco:jacoco-maven-plugin:report

      - name: Publish JaCoCo Report as PR comment
        uses: madrapps/jacoco-report@v1.6
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.
          token: ${{ secrets.GITHUB_TOKEN }}
          #github-token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70

