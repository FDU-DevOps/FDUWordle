<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDUWordle</title>
</head>
<body>

<h1>Welcome to FDU Wordle!</h1>

<p>Type your guess:</p>

<input id="input">
<br><br>

<button onclick="sendInput()">Submit</button>

<h3>Response:</h3>
<p id="output"></p>

<script>
    async function sendInput() {
        const value = document.getElementById("input").value;
        const response = await fetch("/input", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userInput: value })
        });
        const data = await response.json();
        document.getElementById("output").innerText = data.userInput;

    }
</script>

</body>
</html>
