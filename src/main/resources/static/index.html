<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDUWordle</title>
</head>
<body>

<h1>Welcome to FDU Wordle!</h1>

<p>Type your guess:</p>

<input id="submit-guess">
<br><br>

<button onclick="sendUserGuess()">Submit</button>

<h3>Response:</h3>
<p id="output"></p>

<script>
    window.onload = async function()
    {
        const response = await fetch("api/FDUWordle/start-game");
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
    };
    async function sendUserGuess() {
        const value = document.getElementById("submit-guess").value;
        const response = await fetch("api/FDUWordle/submit-guess", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ "playerGuess": value })
        });
        const data = await response.json();
        document.getElementById("output").innerText =
            data.messageToPlayer + " " + data.targetWord;
    }
</script>

</body>
</html>
