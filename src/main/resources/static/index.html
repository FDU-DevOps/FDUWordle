<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDUWordle</title>
</head>
<body>

<h1>FDUWordle</h1>
<p id="version"></p>
<script>
    async function loadVersion() {
        const response = await fetch("/version");
        const version = await response.text(); //https://stackoverflow.com/questions/41946457/getting-text-from-fetch-response-object
        document.getElementById("version").innerText = "Version: " + version;
    }
    loadVersion();
</script>


<p>Type something:</p>

<input id="input">
<br><br>

<button onclick="sendInput()">Submit</button>

<h3>Response:</h3>
<p id="output"></p>

<script>
    async function sendInput() {
        const value = document.getElementById("input").value;
        const response = await fetch("/input", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userInput: value })
        });
        const data = await response.json();
        document.getElementById("output").innerText = data.userInput;

    }
</script>

</body>
</html>
