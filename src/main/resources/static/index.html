<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDUWordle</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" sizes="32*32" href="/wordle/favicon.png">
    <link rel="icon" type="image/png" sizes="16*16" href="/wordle/favicon.png">

</head>

<div id="game">


    <h1>Welcome to FDU Wordle!</h1>
    <p id="version"></p>
    <p id="guessesRemaining" style="color:red;font-weight: bold;"> 6 Guesses Remaining</p>
    <script>
        async function loadVersion() {
            const response = await fetch("api/version");
            const version = await response.text(); //https://stackoverflow.com/questions/41946457/getting-text-from-fetch-response-object
            document.getElementById("version").innerText = "Version: " + version;
        }
        loadVersion();
    </script>

    <br><br>
    <label>Type your guess:</label>

    <!-- The guess board -->
    <div id="guess-row"></div>

    <div id="input-row">
        <input class="tile-input" maxlength="1" aria-label="Letter 1" >
        <input class="tile-input" maxlength="1" aria-label="Letter 2">
        <input class="tile-input" maxlength="1" aria-label="Letter 3">
        <input class="tile-input" maxlength="1" aria-label="Letter 4">
        <input class="tile-input" maxlength="1" aria-label="Letter 5">
    </div>
    <br><br>




    <div style="margin-top:20px">
    <button id="submitButton" onclick="sendUserGuess()">Submit</button>

    <button id="resetButton"  onclick="resetGame()" style="margin-left:24px">Reset Game</button> </div>

    <h3>Response:</h3>
    <p id="output"></p>

    <div></div>
    <div id="keyboard-container"></div>

    <button id="userFeedbackButton" onclick="handleFeedbackClick()">Submit Game Feedback
    </button>

    <script>

        /**
         * @typedef {Object} GameResponse
         * @property {int} guessesRemaining
         * @property {int} maxGuesses
         * @property {boolean} isValidGuess
         * @property {boolean} hasWon
         * @property {string} messageToPlayer
         * @property {string[]} feedbackColors
         * @property {string} targetWord
         */

        window.onload = () => {
            createKeyboardUI(); // Initialize the visual keyboard
            resetGame();        // Reset the game
        };

        async function resetGame() {
            //Get new game
            await fetch("api/FDUWordle/start-game",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                });

            //Clear the UI
            document.getElementById("input-row").style.display = "flex";
            document.getElementById("output").innerText = "";
            document.getElementById("guess-row").innerHTML = "";
            document.getElementById("guessesRemaining").innerText = "6 Guesses Remaining";
            document.querySelectorAll(".tile-input").forEach(tile => {
                tile.disabled = false;
                tile.value = "";});
            document.getElementById("submitButton").disabled = false;   // enable submit button
            document.querySelector(".tile-input").focus();
            createKeyboardUI(); // Reset the board when the reset button is selected
        }


        async function sendUserGuess() {
            const value = Array.from(document.querySelectorAll(".tile-input"))
                .map(tile => tile.value)
                .join("");
            document.getElementById("output").innerText = "";
            const response = await fetch("api/FDUWordle/submit-guess", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "playerGuess": value })
            });
            function clearInputTiles() {
                document.querySelectorAll(".tile-input").forEach(tile => {
                    tile.value = "";
                });

                // move cursor back to first tile
                document.querySelector(".tile-input").focus();
            }
            const data = await response.json();
            if (data.isValidGuess)
            {
                // Update both tiles for feedback and the keyboard
                const guessString = value.toUpperCase().trim();
                addRowWithColoredFeedback(guessString, data.feedbackColors);
                updateKeyboardState(guessString, data.feedbackColors);
                document.getElementById("guessesRemaining").innerText =
                    data.guessesRemaining + " Guesses Remaining";
                clearInputTiles();
            }
            else
            {
                if (data.isNotInWordList) {
                    document.getElementById("output").innerText = "NOT IN WORD LIST.";
                } else {
                    document.getElementById("output").innerText = "INVALID GUESS. MUST BE EXACTLY 5 LETTERS (A-Z).";
                }
                clearInputTiles();
            }

            let gameStateMessage = data.hasWon
                ? `CORRECT! YOU GUESSED THE WORD: <b>${data.targetWord}</b>`
                : `YOU LOST! THE CORRECT ANSWER WAS: <b>${data.targetWord}</b>`;
            //TODO: QOL update - flavor text of "x guesses remaining" is still there if user wins before using up all guesses, so could remove once user wins
            if(data.hasWon || data.guessesRemaining === 0)
            {
                document.getElementById("output").innerHTML += " "+gameStateMessage;
                document.getElementById("submitButton").disabled = true;
                document.getElementById("input-row").style.display = "none";
                document.querySelectorAll(".tile-input").forEach(tile => {
                    tile.disabled = true;
                });
            }

        }

        function addRowWithColoredFeedback(guess, feedback) {
            const board = document.getElementById("guess-row");
            const row = document.createElement("div"); //Create a row

            // Set the row to use flexbox layout so that tiles inside are aligned horizontally
            row.style.display = "flex";
            row.style.flexDirection = "row";

            row.style.gap = "6px";            // Set spacing between each tile
            row.style.marginBottom = "6px";   //Add space below the row so next rows in the future will not be stick to the row
            board.appendChild(row);           //Add row to the guess-board space

            for (let i = 0; i < guess.length; i++) {
                const tile = document.createElement("div");  //Create tile for each letter
                tile.innerText = guess[i];    //Add a letter to each tile

                styleTile(tile)    //Use the style for each tile

                if (feedback[i] === "GREEN") {     //Set specific color for each tile depending on the feedback
                    tile.style.backgroundColor = "green";
                } else if (feedback[i] === "YELLOW") {
                    tile.style.backgroundColor = "goldenrod";
                } else {
                    tile.style.backgroundColor = "gray";
                }

                row.appendChild(tile);  //Add tile to the row object
            }
        }
        const tiles = document.querySelectorAll(".tile-input");

        tiles.forEach((tile, index) => {

            tile.addEventListener("input", () => {
                tile.value = tile.value.toUpperCase();

                if (tile.value.length === 1 && index < tiles.length - 1) {
                    tiles[index + 1].focus();   // move to next tile
                }
            });

            tile.addEventListener("keydown", (e) => {

                if (e.key === "Backspace" && tile.value === "" && index > 0) {
                    tiles[index - 1].focus();   // move to previous tile
                }

            });

        });


        function styleTile(tile) {
            tile.style.width = "40px";             //Width of the tile
            tile.style.height = "40px";            //Heigh of the tile
            tile.style.display = "flex";           // Use flexbox layout so we can center the letter inside the tile
            tile.style.alignItems = "center";      //vertically center the letter
            tile.style.justifyContent = "center";  //horizontally center the letter
            tile.style.fontWeight = "bold";        //Make the letter bold
            tile.style.color = "white";            //Set color of the word
            tile.style.fontSize = "30px";          //Set size of the letter
        }

        document.addEventListener("keyup", (e) => {
            if (e.key === "Enter") {
                const submitBtn = document.getElementById("submitButton");
                if (!submitBtn.disabled) {
                    sendUserGuess();
                }
            }
        });
    </script>
    <script>
        const keyboardState = {};
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(char => {
            keyboardState[char] = "lightgray"; });

        function updateKeyboardState(guess, feedback) {
            const feedbackPriority = { "GREEN": 3, "goldenrod": 2, "GRAY": 1, "lightgray": 0 };
            for (let i = 0; i < guess.length; i++) {
                const letter = guess[i];
                // Yellow is checked and changed to Goldenrod to follow color format in UI
                const newColor = feedback[i] === "YELLOW" ? "goldenrod" : feedback[i];
                const currentColor = keyboardState[letter];
                // Only update if the new color has a higher priority than the current one
                if (feedbackPriority[newColor] > feedbackPriority[currentColor]) {
                    keyboardState[letter] = newColor;
                    // Update the UI element
                    const keyElement = document.getElementById(`key-${letter}`);
                    if (keyElement) {
                        keyElement.style.backgroundColor = newColor;
                        keyElement.style.color = "white"; // Make text readable on colors
                    }
                }
            }
        }

        function createKeyboardUI() {
            // Dynamically generates the QWERTY keyboard UI from a data layout
            const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
            // HTML element where keyboard will be added
            const container = document.getElementById("keyboard-container");
            container.innerHTML = "";
            // Create Tiles for each letter
            layout.forEach(rowString => {
                const row = document.createElement("div");

                // Convert string of keyboard keys to individual letters
                rowString.split("").forEach(letter => {
                    const btn = document.createElement("button");
                    // ID to letter mapping for updates
                    btn.id = `key-${letter}`;
                    btn.innerText = letter;
                    btn.className = "keyboard-tile";
                    row.appendChild(btn);
                });
                container.appendChild(row);
            });
        }
    </script>

    <script> // User Feedback Helper Function
    const USER_FEEDBACK_LINK = 'https://docs.google.com/forms/d/e/1FAIpQLSdr2xzx1jbwUW6hDL321aXq4rXhb8n56_qPCpv8hvU4RCcTCA/viewform';
    function handleFeedbackClick() { window.open(USER_FEEDBACK_LINK, '_blank'); }
    </script>

</div>

</html>
